<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Favicon -->
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/styles.css">

    <script src="../js/carrito.js" defer></script>

</head>

<body>

    <!-- Header -->
    <header class="contenedor-header">

        <!-- div Logo -->
        <div class="logo-container">
            <a href="#">
                <img src="../assets/img/logo.png" alt="Logo del sitio web" class="logo-img">
            </a>

            <h1 class="site-title"> <!-- clase sin usar -->
                Tu Setup Gamer
            </h1>
        </div>

        <!-- Nav - Barra de navegación -->
        <nav class="nav"> <!-- clase sin usar -->
            <ul class="nav-list">
                <li><a href="../index.html" class="nav-link">Inicio</a></li>
                <li><a href="../index.html#productos" class="nav-link">Productos</a></li>
                <li><a href="../index.html#reseñas" class="nav-link">Reseñas</a></li>
                <li><a href="../index.html#contacto" class="nav-link">Contacto</a></li>
                <li><a href="#" class="nav-link">Carrito</a></li>
            </ul>
        </nav>

        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span class="count">0</span>
        </div>

        <div class="nav-login">
            <a href="../pages/login.html">Login</a>
        </div>

    </header>

    <!-- Main -->
    <main>

        <!-- Sección Presentación del sitio -->
        <section class="site-img">
            <h2 class="titulo-presentacion">
                Transformá tu espacio Gamer
            </h2>

        </section>

        <!-- Sección Productos seleccionados -->
        <section id="itemProducts" class="carrito-section">
            <h2 class="carrito-title">Resumen de Compras</h2>
            <p class="carrito-empty">Tu carrito está vacío.</p>
            <!-- Aquí se mostrarán los productos añadidos al carrito -->
        </section>

        <div class="button-container">
            <div>
                <button onclick="limpiarCarrito()" class="button-clear">Limpiar Carrito</button>
            </div>

            <div>
                <button onclick="finalizarCompra()" class="button-buy">Finalizar Compra</button>
            </div>
        </div>


    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>
            <img src="../assets/img/logo.png" alt="Logo del sitio web" class="logo-img">© 2026 Tu Setup Gamer. Todos los

        <div class="circle-up">
            <a href="#">
